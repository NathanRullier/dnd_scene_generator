name: dnd_scene_generator
description: "D&D Scene Generator - Cross-platform local AI image generation from spoken descriptions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Audio / Microphone
  record: ^6.2.0
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0

  # Networking (model downloads)
  dio: ^5.7.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.5.3

  # FFI
  ffi: ^2.1.3

  # UI utilities
  go_router: ^15.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
